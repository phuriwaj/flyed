name = "flyed"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Site configuration
[vars]
# Note: SITE_URL is set in astro.config.mjs as `site: 'https://flyed.dev'`
# and read via Astro.site in src/layouts/Layout.astro. Don't duplicate it
# here — runtime code does not read it from this vars block.
NODE_ENV = "production"

# Production secrets (set via `wrangler secret put` or Cloudflare dashboard):
# - RESEND_API_KEY
# - CRM_WEBHOOK_URL
# - PUBLIC_PLAUSIBLE_DOMAIN